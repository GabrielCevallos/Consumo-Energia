version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: consumo_energia_db
    environment:
      POSTGRES_DB: consumo_energia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
